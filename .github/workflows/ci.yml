name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gearup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gearup_test
      JWT_SECRET: ci-placeholder-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4  # version comes from package.json packageManager field
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @gearup/web exec prisma generate
      - name: Unit tests (vitest)
        run: pnpm --filter @gearup/web test
      - name: Integration tests (vitest + Postgres)
        run: pnpm --filter @gearup/web test:int
      - name: Typecheck
        run: pnpm --filter @gearup/web exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gearup_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gearup_test
