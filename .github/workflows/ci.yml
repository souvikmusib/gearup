name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4  # version comes from package.json packageManager field
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @gearup/web exec prisma generate
      - name: Unit tests (vitest)
        run: pnpm --filter @gearup/web test
      - name: Typecheck
        run: pnpm --filter @gearup/web exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
        env:
          # Build-time only; runtime values come from Vercel env.
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DIRECT_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          JWT_SECRET: ci-placeholder-secret
