name: ci
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gearup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gearup_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gearup_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gearup_test
      JWT_SECRET: ci-placeholder-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Timezone lint
        run: bash scripts/check-tz.sh
      - name: Prisma generate
        run: pnpm --filter @gearup/web exec prisma generate
      - name: Typecheck
        run: pnpm --filter @gearup/web exec tsc --noEmit
      - name: Lint
        run: pnpm lint
      - name: Unit tests
        run: pnpm --filter @gearup/web test
      - name: Push schema to test DB
        run: pnpm --filter @gearup/web exec prisma db push --skip-generate
      - name: Integration tests
        run: pnpm --filter @gearup/web test:int
      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: check
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gearup_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gearup_e2e
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/gearup_e2e
      E2E_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gearup_e2e
      JWT_SECRET: ci-e2e-placeholder-secret-0123456789
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prisma generate
        run: pnpm --filter @gearup/web exec prisma generate
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        run: pnpm --filter @gearup/web exec playwright install --with-deps chromium
      - name: Push schema to E2E DB
        run: pnpm --filter @gearup/web exec prisma db push --skip-generate
      - name: E2E tests
        run: pnpm --filter @gearup/web test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
